events {}

http {
    server {
        listen 443 ssl;
        
        # In a real pipeline, these point to the generated certs.
        # For a basic test, we can use the default self-signed certs if provided, 
        # or mock certificates.
        ssl_certificate /etc/letsencrypt/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/privkey.pem;

        location / {
            proxy_pass http://medishare-api:443;
        }
    }
}