name: Verify Code

# on: [push, pull_request]
on:
  push:
    branches:
      - main
  # pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        # run: npx eslint . --format sarif --output-file eslint-results.sarif
        run: npm run lint

      - name: Run unti testing
        # run: npx eslint . --format sarif --output-file eslint-results.sarif
        run: npm test

  dependency-scan:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "MyWebApp"
          path: "."
          format: "HTML"
          out: "scan-reports"
          # NVD now rate-limits anonymous requests heavily (scans can take
          # 30+ min or fail without a key). Request a free key at
          # https://nvd.nist.gov/developers/request-an-api-key and store it as
          # a repository secret named NVD_API_KEY.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Scan-reports
          path: scan-reports

